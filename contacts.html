<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contacts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; background: #f0f4ff; color: #0f172a; letter-spacing: -0.01em; }
    header { background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%); color: #fff; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(37,99,235,0.25); }
    header a { color: #bfdbfe; text-decoration: none; font-size: 13px; font-weight: 500; padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); }
    header a:hover { background: rgba(255,255,255,0.2); color: #fff; }
    main { max-width: 900px; margin: 24px auto; padding: 0 20px 48px; display: flex; flex-direction: column; gap: 16px; }
    section { background: #fff; border-radius: 14px; padding: 22px 24px; box-shadow: 0 1px 3px rgba(37,99,235,0.06), 0 4px 16px rgba(37,99,235,0.05); border: 1px solid #e0e7ff; }
    label { font-size: 11px; font-weight: 600; display: block; margin-bottom: 5px; color: #374151; letter-spacing: 0.04em; text-transform: uppercase; }
    input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1.5px solid #c7d7fe; font-size: 14px; font-family: inherit; background: #f8faff; color: #0f172a; transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    button { border-radius: 8px; border: none; padding: 8px 16px; font-size: 13px; cursor: pointer; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; font-weight: 600; font-family: inherit; box-shadow: 0 1px 3px rgba(37,99,235,0.3); transition: all 0.15s ease; }
    button:hover:not(:disabled) { background: linear-gradient(135deg, #1d4ed8, #1e40af); box-shadow: 0 4px 12px rgba(37,99,235,0.4); transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }
    button.secondary { background: #eff6ff; color: #2563eb; border: 1.5px solid #bfdbfe; box-shadow: none; }
    button.secondary:hover:not(:disabled) { background: #dbeafe; border-color: #93c5fd; transform: none; box-shadow: none; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
    thead tr { background: #f8faff; }
    th { font-size: 11px; color: #6366f1; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 8px; border-bottom: 2px solid #e0e7ff; text-align: left; }
    td { padding: 10px 8px; border-bottom: 1px solid #f0f4ff; text-align: left; }
    tbody tr:hover td { background: #f8faff; }
    tbody tr:last-child td { border-bottom: none; }
    .small { font-size: 11px; color: #64748b; }
    .status { min-height: 18px; font-size: 13px; margin-top: 8px; }
    .ok { color: #059669; } .err { color: #dc2626; }
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="dashboard.html">&larr; Campaigns</a>
      <div style="font-weight:700;">Contacts</div>
    </div>
    <div class="small">Global address book</div>
  </header>

  <main>
    <section>
      <div style="font-weight:700; margin-bottom:6px;">Add Contact</div>
      <div class="small" style="margin-bottom:10px;">
        Create contacts here, then add them into campaigns from the campaign page.
      </div>

      <div class="row">
        <div>
          <label for="name">Name</label>
          <input id="name" placeholder="Jane Doe" />
        </div>
        <div>
          <label for="phone">Phone (US)</label>
          <input id="phone" placeholder="+15555550123" />
        </div>
      </div>

      <div style="margin-top:10px;">
        <button id="add">Add</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section>
      <div style="font-weight:700; margin-bottom:6px;">All Contacts</div>
      <div class="small">These can be attached to any campaign.</div>

      <table>
        <thead>
          <tr><th>Name</th><th>Phone</th><th>Created</th><th></th></tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="4" class="small">No contacts yet.</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const nameEl = document.getElementById("name");
    const phoneEl = document.getElementById("phone");
    const addBtn = document.getElementById("add");
    const statusEl = document.getElementById("status");
    const tbody = document.getElementById("tbody");

    function isLikelyUSPhone(value) {
      const digits = String(value || "").replace(/\D/g, "");
      return digits.length === 10 || (digits.length === 11 && digits.startsWith("1"));
    }

    async function fetchJSON(url, options = {}) {
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function fmt(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      return Number.isNaN(d.getTime()) ? ts : d.toLocaleString();
    }

    async function load() {
      const data = await fetchJSON("/api/global-contacts");
      const contacts = data.contacts || [];
      tbody.innerHTML = "";

      if (contacts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="small">No contacts yet.</td></tr>';
        return;
      }

      for (const c of contacts) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${c.name}</td>
          <td>${c.phoneNumber}</td>
          <td class="small">${fmt(c.createdAt)}</td>
          <td><button class="secondary" data-id="${c.id}">Delete</button></td>
        `;
        tbody.appendChild(tr);
      }

      tbody.querySelectorAll("button[data-id]").forEach(btn => {
        btn.onclick = async () => {
          if (!confirm("Delete this contact and remove from all campaigns?")) return;
          await fetchJSON("/api/global-contacts/" + encodeURIComponent(btn.dataset.id), { method: "DELETE" });
          await load();
        };
      });
    }

    addBtn.onclick = async () => {
      const name = nameEl.value.trim();
      const phone = phoneEl.value.trim();

      statusEl.className = "status";
      statusEl.textContent = "";

      if (!name || !phone) {
        statusEl.textContent = "Please enter name and phone.";
        statusEl.className = "status err";
        return;
      }
      if (!isLikelyUSPhone(phone)) {
        statusEl.textContent = "Please enter a valid US phone number (10 or 11 digits).";
        statusEl.className = "status err";
        return;
      }

      try {
        await fetchJSON("/api/global-contacts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, phoneNumber: phone })
        });
        nameEl.value = "";
        phoneEl.value = "";
        statusEl.textContent = "Saved.";
        statusEl.className = "status ok";
        await load();
      } catch (e) {
        statusEl.textContent = "Error: " + e.message;
        statusEl.className = "status err";
      }
    };

    load();
  </script>
</body>
</html>
