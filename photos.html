<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>All Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; background: #f0f4ff; color: #0f172a; letter-spacing: -0.01em; }
    header { background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%); color: #fff; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(37,99,235,0.25); }
    header .left { display: flex; align-items: center; gap: 14px; }
    header a { color: #bfdbfe; text-decoration: none; font-size: 13px; font-weight: 500; padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); }
    header a:hover { background: rgba(255,255,255,0.2); color: #fff; }
    header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    header .small { color: #bfdbfe; }
    main { max-width: 1100px; margin: 24px auto 48px; padding: 0 20px; }
    h2 { margin: 0 0 6px; font-size: 16px; font-weight: 700; color: #0f172a; letter-spacing: -0.02em; }
    p.subtle { margin: 0 0 16px; font-size: 13px; color: #64748b; line-height: 1.5; }
    .badge { display: inline-flex; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; background: #dbeafe; color: #1d4ed8; border: none; }
    .sender-block { background: #fff; border-radius: 14px; padding: 16px 18px; box-shadow: 0 1px 3px rgba(37,99,235,0.06), 0 4px 16px rgba(37,99,235,0.05); border: 1px solid #e0e7ff; margin-bottom: 14px; }
    .sender-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .sender-header h3 { margin: 0; font-size: 14px; font-weight: 600; color: #0f172a; }
    .small { font-size: 11px; color: #64748b; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 12px; }
    .photo-card { background: #f8faff; border: 1.5px solid #e0e7ff; border-radius: 10px; overflow: hidden; transition: box-shadow 0.15s, transform 0.15s; }
    .photo-card:hover { box-shadow: 0 4px 16px rgba(37,99,235,0.15); transform: translateY(-2px); }
    .photo-card img { width: 100%; height: 90px; object-fit: cover; display: block; }
    .photo-meta { padding: 5px 7px 7px; font-size: 11px; }
    .photo-meta-top { display: flex; justify-content: space-between; gap: 4px; }
    .link { color: #2563eb; text-decoration: none; font-size: 11px; font-weight: 500; }
    .link:hover { text-decoration: underline; }
    .reuse { margin-top: 4px; padding: 2px 6px; border-radius: 6px; border: 1px solid #f59e0b; background: #fffbeb; color: #92400e; display: inline-block; font-size: 11px; }
    @media (max-width: 600px) { .sender-header { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <a href="dashboard.html">&larr; Campaigns</a>
      <div>
        <div class="small">Gallery</div>
        <h1>All Photos</h1>
      </div>
    </div>
    <div class="right">
      <a href="contacts.html">Contacts</a>
    </div>
  </header>

  <main>
    <h2>Photos across all campaigns</h2>
    <p class="subtle">
      This view shows every photo you’ve received, grouped by contact. Each photo indicates which
      campaign it came from, and whether it’s reused in other campaigns.
    </p>

    <div id="photosRoot" class="small">Loading…</div>
  </main>

  <script>
    const root = document.getElementById("photosRoot");

    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function fmt(ts) {
      if (!ts) return "–";
      const d = new Date(ts);
      return Number.isNaN(d.getTime()) ? ts : d.toLocaleString();
    }

    async function loadPhotos() {
      try {
        const data = await fetchJSON("/api/photos");
        const items = data.data || [];

        if (!items.length) {
          root.textContent = "No photos yet.";
          return;
        }

        root.innerHTML = "";

        for (const sender of items) {
          const block = document.createElement("div");
          block.className = "sender-block";

          const header = document.createElement("div");
          header.className = "sender-header";
          header.innerHTML = `
            <div>
              <h3>${sender.name || sender.phoneNumber}</h3>
              <div class="small">${sender.phoneNumber}</div>
            </div>
            <div class="small">
              <span class="badge">${sender.photos.length} photo(s)</span><br>
              <a class="link" href="contact.html?id=${encodeURIComponent(sender.contactId || "")}">
                View contact details
              </a>
            </div>
          `;
          block.appendChild(header);

          const grid = document.createElement("div");
          grid.className = "photo-grid";

          // Most recent first
          const photosSorted = sender.photos.slice().sort(
            (a, b) => new Date(b.createdAt) - new Date(a.createdAt)
          );

          for (const p of photosSorted) {
            const card = document.createElement("div");
            card.className = "photo-card";

            const img = document.createElement("img");
            img.src = p.url;
            img.alt = p.filename;
            card.appendChild(img);

            const meta = document.createElement("div");
            meta.className = "photo-meta";

            const top = document.createElement("div");
            top.className = "photo-meta-top";
            top.innerHTML = `
              <div>${p.filename}</div>
              <div class="small">${fmt(p.createdAt)}</div>
            `;
            meta.appendChild(top);

            const line2 = document.createElement("div");
            line2.className = "small";
            if (p.campaignId && p.campaignName) {
              line2.innerHTML = `
                From campaign:
                <a class="link" href="campaign.html?id=${encodeURIComponent(p.campaignId)}">
                  ${p.campaignName}
                </a>
              `;
            } else if (p.campaignId) {
              line2.innerHTML = `
                From campaign:
                <a class="link" href="campaign.html?id=${encodeURIComponent(p.campaignId)}">
                  (no name)
                </a>
              `;
            } else {
              line2.textContent = "Not assigned to a campaign";
            }
            meta.appendChild(line2);

            if (p.similarInOtherCampaigns && p.similarInOtherCampaigns.length > 0) {
              const reuse = document.createElement("div");
              reuse.className = "reuse";
              reuse.textContent = `⚠ Also used in ${p.similarInOtherCampaigns.length} other campaign(s)`;
              meta.appendChild(reuse);
            }

            card.appendChild(meta);
            grid.appendChild(card);
          }

          block.appendChild(grid);
          root.appendChild(block);
        }
      } catch (e) {
        root.textContent = "Error loading photos: " + e.message;
      }
    }

    loadPhotos();
  </script>
</body>
</html>
